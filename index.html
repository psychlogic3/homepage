<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsychLogic — Where Psychology Meets Strategy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #FFFFFF 0%, #E8F4F6 40%, #FFF0EB 100%);

        .logo {

        .logo img {

            display: block;
        }
        .tagline {
            position: fixed;
            bottom: 36px;
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: clamp(15px, 2.5vw, 20px);
            color: #1B3A5C;
            letter-spacing: 1.5px;
            opacity: 0.55;
        }

</head>
<body>
    <div class="logo">
        <img src="PsychLogic_DP.png" alt="PsychLogic">

</html>
